# docker-compose.otel.yml
#
# Epic A: Observability stack — OTel Collector + Jaeger + Langfuse (optional)
#
# Usage:
#   docker-compose -f docker-compose.otel.yml up -d
#
# Then start the proxy with:
#   OTEL_ENABLED=true \
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 \
#   LANGFUSE_SECRET_KEY=sk-lf-changeme \
#   LANGFUSE_PUBLIC_KEY=pk-lf-changeme \
#   LANGFUSE_HOST=http://localhost:3010 \
#   pnpm start

version: "3.8"

services:
  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics scrape endpoint
    restart: unless-stopped

  # ── Jaeger (trace backend + UI) ───────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI  → http://localhost:16686
      - "14250:14250"   # gRPC collector
      - "14268:14268"   # HTTP collector
    restart: unless-stopped

  # ── Langfuse (LLM observability UI) ──────────────────────────────────────
  langfuse-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB:       langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse-db
    ports:
      - "3010:3000"   # Langfuse UI → http://localhost:3010
    environment:
      DATABASE_URL:        postgresql://langfuse:langfuse@langfuse-db/langfuse
      NEXTAUTH_URL:        http://localhost:3010
      NEXTAUTH_SECRET:     changeme-nextauth-secret
      SALT:                changeme-salt
      TELEMETRY_ENABLED:   "false"
    restart: unless-stopped

volumes:
  langfuse_db:
