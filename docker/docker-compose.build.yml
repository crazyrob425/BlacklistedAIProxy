services:
  blacklisted-api:
    # Build from Dockerfile locally
    # Usage: docker compose -f docker/docker-compose.build.yml up -d --build
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: blacklistedapi
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ../configs:/app/configs
    environment:
      - ARGS=
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
