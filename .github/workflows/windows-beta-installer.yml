name: Package Beta Windows Installer

on:
  workflow_dispatch:
    inputs:
      prerelease_tag:
        description: 'Pre-release tag (e.g., beta.1, rc.1, alpha.1)'
        required: true
        default: 'beta.1'
      version_override:
        description: 'Version override (leave empty to read from VERSION file)'
        required: false

concurrency:
  group: windows-packaging
  cancel-in-progress: false

jobs:
  package-beta-installer:
    name: Build Beta Installer (Windows x64)
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read/Calculate version
        id: version
        shell: powershell
        run: |
          $baseVersion = if ("${{ github.event.inputs.version_override }}") {
            "${{ github.event.inputs.version_override }}"
          } else {
            (Get-Content VERSION | ForEach-Object { $_.Trim() })
          }
          
          $prerelease = "${{ github.event.inputs.prerelease_tag }}"
          $fullVersion = "$baseVersion-$prerelease"
          $versionNumeric = $baseVersion -replace '-.*', ''
          $versionNumeric = "$versionNumeric.$((Get-Date).DayOfYear)"
          
          Write-Output "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          Write-Output "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          Write-Output "full_version=$fullVersion" >> $env:GITHUB_OUTPUT
          Write-Output "version_numeric=$versionNumeric" >> $env:GITHUB_OUTPUT
          
          Write-Host "Base Version: $baseVersion"
          Write-Host "Pre-release: $prerelease"
          Write-Host "Full Version: $fullVersion"
          Write-Host "Numeric Version: $versionNumeric"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tls-sidecar/go.sum

      - name: Create build directories
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "build\nssm" -Force | Out-Null
          New-Item -ItemType Directory -Path "build\node" -Force | Out-Null
          New-Item -ItemType Directory -Path "Output" -Force | Out-Null

      - name: Download NSSM (Non-Sucking Service Manager)
        shell: powershell
        run: |
          $nssm_zip = "$env:TEMP\nssm.zip"
          $nssm_extract = "$env:TEMP\nssm-extract"
          $retry_backoff_seconds = 2
          $downloaded = $false
          $nssm_urls = @(
            "https://nssm.cc/release/nssm-2.24.zip",
            "https://nssm.cc/release/nssm-2.24-101-g897c7ad.zip"
          )
          
          foreach ($nssm_url in $nssm_urls) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Write-Host "Downloading NSSM from $nssm_url (attempt $attempt/3)..."
                Invoke-WebRequest -Uri $nssm_url -OutFile $nssm_zip -ErrorAction Stop
                $downloaded = $true
                break
              } catch {
                Write-Warning "NSSM download failed: $($_.Exception.Message)"
                if ($attempt -lt 3) {
                  Start-Sleep -Seconds ($retry_backoff_seconds * $attempt)
                }
              }
            }
            if ($downloaded) { break }
          }

          if ($downloaded) {
            Write-Host "Extracting NSSM archive..."
            if (Test-Path $nssm_extract) { Remove-Item $nssm_extract -Recurse -Force }
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::ExtractToDirectory($nssm_zip, $nssm_extract)

            $nssmExe = Get-ChildItem -Path $nssm_extract -Filter "nssm.exe" -Recurse |
              Where-Object { $_.FullName -match "win64" } |
              Select-Object -First 1
            if (-not $nssmExe) {
              $nssmExe = Get-ChildItem -Path $nssm_extract -Filter "nssm.exe" -Recurse | Select-Object -First 1
            }
            if (-not $nssmExe) {
              throw "NSSM archive downloaded but nssm.exe not found"
            }
            Copy-Item $nssmExe.FullName "build\nssm\nssm.exe" -Force
          } else {
            Write-Warning "NSSM archive download failed after retries. Falling back to Chocolatey package."
            choco install nssm --no-progress -y
            $chocoNssm = (Get-Command nssm -ErrorAction SilentlyContinue).Source
            if (-not $chocoNssm -or -not (Test-Path $chocoNssm)) {
              $chocoNssm = "C:\ProgramData\chocolatey\bin\nssm.exe"
            }
            if (-not (Test-Path $chocoNssm)) {
              throw "Unable to obtain nssm.exe from download or Chocolatey fallback"
            }
            Copy-Item $chocoNssm "build\nssm\nssm.exe" -Force
          }
          
          Write-Host "NSSM copied to build\nssm\nssm.exe"

      - name: Download Node.js portable
        shell: powershell
        run: |
          $node_url = "https://nodejs.org/dist/v20.17.0/node-v20.17.0-win-x64.zip"
          $node_zip = "$env:TEMP\node.zip"
          
          Write-Host "Downloading Node.js from $node_url..."
          Invoke-WebRequest -Uri $node_url -OutFile $node_zip -ErrorAction Stop
          
          Write-Host "Extracting Node.js..."
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($node_zip, "$env:TEMP\node-extract")
          
          Copy-Item "$env:TEMP\node-extract\node-v20.17.0-win-x64\*" "build\node\" -Recurse -Force
          Write-Host "Node.js copied to build\node\"

      - name: Install npm dependencies
        shell: powershell
        run: |
          npm ci --no-optional
          Write-Host "Dependencies installed"

      - name: Build tls-sidecar (Go)
        shell: powershell
        run: |
          Push-Location tls-sidecar
          
          Write-Host "Downloading Go dependencies..."
          go mod download
          
          Write-Host "Building tls-sidecar.exe..."
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags="-s -w" -o tls-sidecar.exe .
          
          if (-not (Test-Path "tls-sidecar.exe")) {
            throw "Build failed: tls-sidecar.exe not found"
          }
          
          Pop-Location
          Copy-Item "tls-sidecar\tls-sidecar.exe" . -Force
          Write-Host "tls-sidecar.exe built successfully"

      - name: Validate critical files
        shell: powershell
        run: |
          $required = @(
            "installer\BlacklistedProxy.iss",
            "install-and-run.bat",
            "install-and-run.ps1",
            "healthcheck.js",
            "tls-sidecar.exe",
            "configs\config.json.example",
            "configs\provider_pools.json.example",
            "package.json",
            "src\core\master.js"
          )
          
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required file missing: $path"
            }
            Write-Host "✓ $path"
          }

      - name: Create portable bundle (ZIP)
        shell: powershell
        run: |
          Write-Host "Creating portable bundle..."
          
          # Create temp folder
          $portableDir = "$env:TEMP\BlacklistedAIProxy-portable"
          if (Test-Path $portableDir) { Remove-Item $portableDir -Recurse -Force }
          New-Item -ItemType Directory -Path $portableDir | Out-Null
          
          # Copy app files
          Copy-Item "src", "configs", "static", "node_modules" -Destination $portableDir -Recurse -Force
          Copy-Item "package.json", "package-lock.json", "healthcheck.js", "VERSION", "LICENSE", "README.md" -Destination $portableDir -Force
          Copy-Item "build\node\*" -Destination "$portableDir\runtime" -Recurse -Force
          Copy-Item "tls-sidecar.exe" -Destination "$portableDir\tls-sidecar\" -Force
          
          # Zip it
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = "build\BlacklistedAIProxy-portable.zip"
          [System.IO.Compression.ZipFile]::CreateFromDirectory($portableDir, $zipPath, [System.IO.Compression.CompressionLevel]::Optimal, $false)
          
          Write-Host "Portable bundle created: $zipPath"
          $zipSize = (Get-Item $zipPath).Length / 1MB
          Write-Host "Size: $($zipSize)MB"

      - name: Download & setup Inno Setup
        shell: powershell
        run: |
          $inno_url = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $inno_installer = "$env:TEMP\innosetup.exe"
          
          Write-Host "Downloading Inno Setup from $inno_url..."
          Invoke-WebRequest -Uri $inno_url -OutFile $inno_installer -ErrorAction Stop
          
          Write-Host "Installing Inno Setup..."
          & $inno_installer /SILENT /SUPPRESSMSGBOXES /SP- | Out-Null
          
          # Wait for installation
          Start-Sleep -Seconds 10
          
          $innoPath = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $innoPath)) {
            throw "Inno Setup installation failed"
          }
          Write-Host "Inno Setup installed successfully"

      - name: Compile installer with Inno Setup
        shell: powershell
        run: |
          $innoPath = "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          $scriptPath = "installer\BlacklistedProxy.iss"
          
          Write-Host "Compiling installer script: $scriptPath"
          
          $env:INNO_VERSION = "${{ steps.version.outputs.full_version }}"
          $env:INNO_VERSION_NUMERIC = "${{ steps.version.outputs.version_numeric }}"
          
          & $innoPath /D"AppVersion=${{ steps.version.outputs.full_version }}" `
                      /D"AppVersionNumeric=${{ steps.version.outputs.version_numeric }}" `
                      $scriptPath
          
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }
          
          Write-Host "Installer compiled successfully"

      - name: Verify installer output
        shell: powershell
        run: |
          $installerName = "BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe"
          $installerPath = "Output\$installerName"
          
          if (-not (Test-Path $installerPath)) {
            throw "Installer not found at: $installerPath"
          }
          
          $size = (Get-Item $installerPath).Length / 1MB
          Write-Host "✓ Installer created: $installerName"
          Write-Host "✓ Size: $($size)MB"
          Write-Host "✓ Path: $installerPath"

      - name: Run installer smoke test
        shell: powershell
        timeout-minutes: 10
        run: |
          Write-Host "Running installer smoke test..."
          
          $installerName = "BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe"
          $installerPath = "Output\$installerName"
          $testDir = "$env:TEMP\BlacklistedAIProxy-Test"
          
          if (Test-Path $testDir) { Remove-Item $testDir -Recurse -Force }
          
          Write-Host "Testing silent installation to: $testDir"
          & $installerPath /SILENT /NORESTART /DIR="$testDir" /COMPONENTS="app"
          
          Start-Sleep -Seconds 3
          
          if (Test-Path "$testDir\src\core\master.js") {
            Write-Host "✓ Smoke test passed: Core files installed"
          } else {
            throw "Smoke test failed: Core files not found"
          }

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.full_version }}
          release_name: BlacklistedAIProxy ${{ steps.version.outputs.full_version }} (Beta Pre-Release)
          body: |
            ## Beta Pre-Release: ${{ steps.version.outputs.full_version }}
            
            **⚠️ This is a pre-release build for testing purposes only.**
            
            ### What's New
            - Version: ${{ steps.version.outputs.full_version }}
            - Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
            - Platform: Windows x64
            - Node.js: 20.17.0
            - Go sidecar: 1.22
            
            ### Installation
            1. Download `BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe`
            2. Run the installer
            3. Choose installation mode (Full Service or Portable)
            4. Follow the wizard prompts
            
            ### Testing Notes
            - Full install runs as Windows Service (auto-starts at boot)
            - Portable mode available for USB/removable media
            - Self-healing watchdog included in Full mode
            
            ### Known Limitations (Pre-Release)
            - This is a beta build; expect potential bugs
            - Not recommended for production use
            - Configuration may reset on update
            
            ### Bug Reports
            Please report issues: [GitHub Issues](https://github.com/crazyrob425/BlacklistedAIProxy/issues)
            
            ---
            Built with ❤️ by Blacklisted Binary Labs
          draft: false
          prerelease: true

      - name: Upload installer to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Output/BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe
          asset_name: BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: Generate build summary
        shell: powershell
        run: |
          Write-Host "## ✅ Beta Installer Package Complete" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "**Version:** ${{ steps.version.outputs.full_version }}" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "**Release Tag:** v${{ steps.version.outputs.full_version }}" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "**Platform:** Windows x64" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "**Installer:** BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "**Release URL:** ${{ steps.create_release.outputs.html_url }}" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ Code compiled" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ Dependencies installed" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ TLS sidecar built" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ Portable bundle created" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ Installer compiled" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ Smoke test passed" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY
          Write-Host "✓ GitHub Release created" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY

      - name: Upload installer to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlacklistedAIProxy-Beta-Installer
          path: Output/BlacklistedAIProxy-Setup-${{ steps.version.outputs.full_version }}-win-x64.exe
          retention-days: 30
          compression-level: 0
